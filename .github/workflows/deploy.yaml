name: Deploy Nodejs application to amazon Ec2

on:
    push:
        branches:
            - main
            - master
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:

        - name: Checkout Code
          uses: actions/checkout@v4
        
        - name: Deploy via ssh
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.SSH_HOST }}
            username: ubuntu
            key: ${{ secrets.SSH_KEY }}
            script: |
              cd /home/ubuntu/github-actions-test
              git pull
              sudo docker compose up -d --build
